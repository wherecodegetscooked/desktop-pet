name: Build macOS release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app bundle
        env:
          # Monotonic build number the in-app updater compares against.
          BUILD_VERSION: ${{ github.run_number }}
        run: |
          chmod +x build_macos_release.sh
          ./build_macos_release.sh

      # Rolling "latest" release the app's "Check for updates" pulls from.
      # version.txt is the tiny file it reads first; the zip is the new bundle.
      - name: Publish latest build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: false
          make_latest: true
          files: |
            release/Desktop-Pet-macOS.zip
            release/Desktop-Pet-macOS.dmg
            release/version.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tagged versions (vX.Y.Z) also get their own immutable release.
      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            release/Desktop-Pet-macOS.dmg
            release/Desktop-Pet-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
